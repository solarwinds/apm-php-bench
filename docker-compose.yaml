x-logging-resource: &logging-resource
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  otel-collector-locust:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-locust
    logging: *logging-resource
    user: "0"  # to access docker.sock
    environment:
      - API_TOKEN=${OTEL_TOKEN}
      - OTEL_COLLECTOR=${OTEL_COLLECTOR}
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro

  otel-collector-apm-php-9-alpha:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-apm-php-9-alpha
    logging: *logging-resource
    user: "0"  # to access docker.sock
    environment:
      - API_TOKEN=${OTEL_TOKEN}
      - OTEL_COLLECTOR=${OTEL_COLLECTOR}
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro

  otel-collector-otel:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-otel
    logging: *logging-resource
    user: "0"  # to access docker.sock
    environment:
      - API_TOKEN=${OTEL_TOKEN}
      - OTEL_COLLECTOR=${OTEL_COLLECTOR}
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro

