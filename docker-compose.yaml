services:
  otel-collector-locust:
    image: otel/opentelemetry-collector-contrib:latest
    environment:
      - API_TOKEN=${OTEL_TOKEN}
      - OTEL_COLLECTOR=${OTEL_COLLECTOR}
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml

  otel-collector-apm-php:
    image: solarwinds/solarwinds-otel-collector:latest-verified
    environment:
      - SOLARWINDS_TOKEN=${OTEL_TOKEN}
      - OTEL_COLLECTOR=${OTEL_COLLECTOR}
    volumes:
      - ./swotel-collector-config.yaml:/opt/default-config.yaml

  nginx-uninstrumented:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./slim-app/nginx-uninstrumented.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm-uninstrumented
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx-apm-php:
    image: nginx:latest
    ports:
      - "8001:80"
    volumes:
      - ./slim-app/nginx-apm-php.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm-apm-php
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx-apm-proto:
    image: nginx:latest
    ports:
      - "8002:80"
    volumes:
      - ./slim-app/nginx-apm-proto.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm-apm-proto
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  php-fpm-uninstrumented:
    build:
      context: slim-app
      dockerfile: Dockerfile-uninstrumented

  php-fpm-apm-php:
    build:
      context: slim-app
      dockerfile: Dockerfile-apm-php
    environment:
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_LOG_LEVEL=warn
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector-apm-php:4318}
      - OTEL_SERVICE_NAME=apm-php-bench-php-fpm-apm-php
      - OTEL_TRACES_SAMPLER=solarwinds_http
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=delta
      - SW_APM_COLLECTOR=${SW_APM_COLLECTOR:-collector}
      - SW_APM_SERVICE_KEY=${SW_APM_TOKEN:-token}:apm-php-bench-php-fpm-apm-php
      - OTEL_PROPAGATORS=baggage,tracecontext,swotracestate,xtraceoptions
      - OTEL_EXPERIMENTAL_RESPONSE_PROPAGATORS=xtrace,xtraceoptionsresponse

  php-fpm-apm-proto:
    build:
      context: slim-app
      dockerfile: Dockerfile-apm-proto
      args:
        - APM_RELEASE=GA
        - APM_VERSION=latest
        - APM_SERVICE_KEY=${SW_APM_TOKEN:-token}:apm-php-bench-php-fpm-apm-proto
        - APM_COLLECTOR=${SW_APM_COLLECTOR:-collector}

  apm-php-bench-locust:
    build:
      context: locust-app
      dockerfile: Dockerfile
    container_name: apm-php-bench-locust
    environment:
      - API_TOKEN=${SW_APM_TOKEN:-token}
      - OTEL_COLLECTOR=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector-locust:4318}
      - SERVICE_NAME=apm-php-bench-locust
    depends_on:
      nginx-uninstrumented:
        condition: service_healthy
      nginx-apm-php:
        condition: service_healthy
      nginx-apm-proto:
        condition: service_healthy
    command: locust --headless -u 100 --spawn-rate 5 --host http://0.0.0.0:8000
