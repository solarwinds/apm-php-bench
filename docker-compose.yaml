  nginx-uninstrumented:
    image: nginx:latest
    container_name: nginx-uninstrumented
    logging: *logging-resource
    ports:
      - "8000:80"
    volumes:
      - ./slim-app/nginx-uninstrumented.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm-uninstrumented
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx-apm-php-9-alpha:
    image: nginx:latest
    container_name: nginx-apm-php-9-alpha
    logging: *logging-resource
    ports:
      - "8001:80"
    volumes:
      - ./slim-app/nginx-apm-php-9-alpha.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm-apm-php-9-alpha
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx-otel:
    image: nginx:latest
    container_name: nginx-otel
    logging: *logging-resource
    ports:
      - "8002:80"
    volumes:
      - ./slim-app/nginx-otel.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm-otel
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx-apm-8:
    image: nginx:latest
    container_name: nginx-apm-8
    logging: *logging-resource
    ports:
      - "8003:80"
    volumes:
      - ./slim-app/nginx-apm-8.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm-apm-8
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  php-fpm-uninstrumented:
    build:
      context: slim-app
      dockerfile: Dockerfile-uninstrumented
    container_name: php-fpm-uninstrumented
    logging: *logging-resource

  php-fpm-apm-php-9-alpha:
    build:
      context: slim-app
      dockerfile: Dockerfile-apm-php-9-alpha
    container_name: php-fpm-apm-php-9-alpha
    logging: *logging-resource
    environment:
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_LOG_LEVEL=warning
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector-apm-php-9-alpha:4318}
      - OTEL_SERVICE_NAME=apm-php-bench-php-fpm-apm-php-9-alpha
      - OTEL_TRACES_SAMPLER=solarwinds_http
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=delta
      - OTEL_EXPORTER_OTLP_METRICS_DEFAULT_HISTOGRAM_AGGREGATION=base2_exponential_bucket_histogram
      - SW_APM_COLLECTOR=${SW_APM_COLLECTOR:-collector}
      - SW_APM_SERVICE_KEY=${SW_APM_TOKEN:-token}:apm-php-bench-php-fpm-apm-php-9-alpha
      - OTEL_PROPAGATORS=baggage,tracecontext,swotracestate,xtraceoptions
      - OTEL_EXPERIMENTAL_RESPONSE_PROPAGATORS=xtrace,xtraceoptionsresponse

  php-fpm-otel:
    build:
      context: slim-app
      dockerfile: Dockerfile-otel
    container_name: php-fpm-otel
    logging: *logging-resource
    environment:
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_LOG_LEVEL=warning
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector-otel:4318}
      - OTEL_SERVICE_NAME=apm-php-bench-php-fpm-otel
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=delta
      - OTEL_EXPORTER_OTLP_METRICS_DEFAULT_HISTOGRAM_AGGREGATION=base2_exponential_bucket_histogram
      - OTEL_PROPAGATORS=baggage,tracecontext
      - OTEL_RESOURCE_ATTRIBUTES=sw.data.module=apm,sw.apm.version=0.0.0,sw.transaction=complex_trace  # hard-code transaction for all requests to match APM-instrumented apps

  php-fpm-apm-8:
    build:
      context: slim-app
      dockerfile: Dockerfile-apm-8
      args:
        - APM_RELEASE=GA
        - APM_VERSION=latest
        - APM_SERVICE_KEY=${SW_APM_TOKEN:-token}:apm-php-bench-php-fpm-apm-8
        - APM_COLLECTOR=${SW_APM_COLLECTOR:-collector}
    container_name: php-fpm-apm-8
    logging: *logging-resource

  apm-php-bench-locust:
    build:
      context: locust-app
      dockerfile: Dockerfile
    container_name: apm-php-bench-locust
    logging: *logging-resource
    environment:
      - API_TOKEN=${SW_APM_TOKEN:-token}
      - OTEL_COLLECTOR=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector-locust:4318}
      - SERVICE_NAME=apm-php-bench-locust
    depends_on:
      nginx-uninstrumented:
        condition: service_healthy
      nginx-apm-php-9-alpha:
        condition: service_healthy
      nginx-otel:
        condition: service_healthy
      nginx-apm-8:
        condition: service_healthy
    command: locust --headless -u 1 --spawn-rate 5 --host http://0.0.0.0:8000
